name: Weekly Stock Dividend Monitor

on:
  schedule:
    # 每週五 09:00 UTC (等於台北/北京時間 17:00，收盤後執行)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    # 支援手動觸發測試

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 自動緩存依賴項

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests openpyxl

      - name: Run Monitor Script
        env:
          # 從 GitHub Secrets 讀取 Webhook 網址
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python monitor.py
